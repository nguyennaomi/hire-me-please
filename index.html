<!DOCTYPE html>
<html>
<head>
    <title>Hire Me Please</title>

    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: "Courier New", monospace;
            font-size: 16px;
            margin: 0;
            padding: 20px;
        }

        #terminal {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .line {
            display: flex;
            align-items: center;
        }

        .prompt {
            margin-right: 8px;
        }

        input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex: 1;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

let waitingForAnswer = false;
let waitingForSecondAnswer = false;

function print(text = "") {
    terminal.innerHTML += text + "\n";
    window.scrollTo(0, document.body.scrollHeight);
}

function createPrompt() {

    const line = document.createElement("div");
    line.className = "line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.textContent = "naomi@hire-me-please-terminal:~$";

    const input = document.createElement("input");

    line.appendChild(prompt);
    line.appendChild(input);

    terminal.appendChild(line);

    input.focus();

    input.addEventListener("keydown", function(e) {

        if (e.key !== "Enter") return;

        const command = input.value.trim();

        input.disabled = true;

        handleCommand(command);

        createPrompt();
    });
}

function startup() {

    print("================================");
    print("     Hire Me Please v1.0");
    print("================================");
    print("");
    print("Type 'help' for commands.");
    print("");
}

function askQuestion() {
    print("Did you recently have an interview with me? (yes/no)");
    waitingForAnswer = true;
}

function askSecondQuestion() {
  print("Did you like me after the interview? (yes/no)");
  waitingForSecondAnswer = true;
}

function handleSecondCommand(cmd) {
  if (waitingForSecondAnswer) {
    if (cmd.toLowerCase() === "yes") {
      print("PLEASE PLEASE PLEASE HIRE ME!!!!");
      
      const img = document.createElement("img");
      img.src = "images/beggar-emoji.png";
      img.style.maxWidth = "500px";
      img.style.marginTop = "10px";
	
      terminal.appendChild(img);
    }
    else {
      print("Please email me naominguyen612@gmail.com to display your discontent because I am truly sorry.");
	}
}

function handleCommand(cmd) {

    if (waitingForAnswer) {

        if (cmd.toLowerCase() === "yes") {
            askSecondQuestion();
        }
        else {
            print("WRONG ANSWER PLEASE RETURN THIS WEBSITE!!!!!");
        }
        waitingForAnswer = false;
        return;
    }

    switch(cmd.toLowerCase()) {

        case "help":
            print("");
            print("Available Commands:");
            print("------------------");
            print("help      Show commands");
            print("start     Please Please PLEASE JUST HIRE ME");
            print("clear     Clear terminal");
            print("about     About terminal");
            print("");
            break;

        case "about":
            print("Hire Me Please running on GitHub Pages.");
            break;

        case "start":
            print("Starting code...");
            askQuestion();
            break;

        case "clear":
            terminal.innerHTML = "";
            break;

        default:
            print(`Command not found: ${cmd}`);
    }
}

startup();
createPrompt();

</script>

</body>
</html>
